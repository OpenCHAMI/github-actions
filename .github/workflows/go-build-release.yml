name: GoReleaser
run-name: GoReleaser ${{ (inputs.snapshot == 'true' || (inputs.snapshot != 'false' && !startsWith(github.ref, 'refs/tags/v'))) && 'Snapshot' || 'Release' }}

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: 'stable'
      fetch-depth:
        description: 'Git fetch depth for checkout'
        required: false
        type: number
        default: 0
      fetch-tags:
        description: 'Whether to fetch tags during checkout'
        required: false
        type: number
        default: 1
      cgo-enabled:
        description: 'Set CGO_ENABLED environment variable'
        required: false
        type: number
      additional-env-vars:
        description: 'Additional environment variables to set (KEY=value format, one per line)'
        required: false
        type: string
        default: ''
      pre-build-commands:
        description: 'Commands to run before GoReleaser (multiline string)'
        required: false
        type: string
        default: ''
      goreleaser-version:
        description: 'GoReleaser version to use'
        required: false
        type: string
        default: 'latest'
      goreleaser-args:
        description: 'Additional arguments for goreleaser'
        required: false
        type: string
        default: 'release --clean'
      attestation-binary-path:
        description: 'Path for binary attestation'
        required: false
        type: string
        default: 'dist/*'
      registry-name:
        description: 'Container registry name (e.g., ghcr.io/openchami/project-name) to Generate build provenance for container'
        required: true
        type: string
      snapshot:
        description: 'Snapshot mode: auto (default - snapshot if not a tag), true (force snapshot), false (force regular release)'
        required: false
        type: string
        default: 'auto'
      devel:
        description: 'Create and upload a development build'
        type: boolean
        required: false
        default: false
      ref:
        description: 'The commit hash for development builds'
        required: false
        type: string
        default: ''

permissions: write-all # Necessary for the generate-build-provenance action with containers

jobs:
  goreleaser:
    name: GoReleaser ${{ (inputs.snapshot == 'true' || (inputs.snapshot != 'false' && !startsWith(github.ref, 'refs/tags/v'))) && 'Snapshot' || 'Release' }}
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: ${{ inputs.fetch-tags }}
          fetch-depth: ${{ inputs.fetch-depth }}
          ref: ${{ inputs.ref }}

      - name: Set build environment variables
        run: |
          if git diff-index --quiet HEAD --; then
            git_state='clean'
          else
            git_state='dirty'
          fi
          build_host=$(hostname)
          go_version=$(go version | awk '{print $3}')
          build_user=$(whoami)
          {
            echo "GIT_STATE=${git_state}"
            echo "BUILD_HOST=${build_host}"
            echo "GO_VERSION=${go_version}"
            echo "BUILD_USER=${build_user}"
          } >> "$GITHUB_ENV"

      - name: Set CGO_ENABLED if specified
        if: ${{ inputs.cgo-enabled != null }}
        run: echo "CGO_ENABLED=${{ inputs.cgo-enabled }}" >> "$GITHUB_ENV"

      - name: Set additional environment variables
        if: ${{ inputs.additional-env-vars != '' }}
        run: |
          # Process additional environment variables
          echo "${{ inputs.additional-env-vars }}" | while IFS= read -r line; do
            if [[ -n "$line" && "$line" == *"="* ]]; then
              echo "$line" >> "$GITHUB_ENV"
            fi
          done

      - name: Run pre-build commands
        if: ${{ inputs.pre-build-commands != '' }}
        run: ${{ inputs.pre-build-commands }}

      - name: Determine snapshot flags
        id: snapshot_flags
        run: |
          if [[ "${{ inputs.snapshot }}" == "true" ]]; then
            echo "flags=--snapshot" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.snapshot }}" == "false" ]]; then
            echo "flags=" >> "$GITHUB_OUTPUT"
          else
            # auto mode - snapshot if not a tag
            github_ref="${{ github.ref }}"
            if [[ "$github_ref" != refs/tags/v* ]]; then
              echo "flags=--snapshot" >> "$GITHUB_OUTPUT"
            else
              echo "flags=" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: GoReleaser ${{ inputs.goreleaser-args }} ${{ steps.snapshot_flags.outputs.flags }}
        id: goreleaser
        uses: goreleaser/goreleaser-action@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          version: ${{ inputs.goreleaser-version }}
          args: ${{ inputs.goreleaser-args }} ${{ steps.snapshot_flags.outputs.flags }}

      - name: Process GoReleaser output
        id: process_goreleaser_output
        if: ${{ !contains(steps.snapshot_flags.outputs.flags, '--snapshot') }}
        run: |
          {
            echo "const fs = require('fs');"
            echo 'const artifacts = ${{ steps.goreleaser.outputs.artifacts }}'
            echo "const firstNonNullDigest = artifacts.find(artifact => artifact.extra && artifact.extra.Digest != null)?.extra.Digest;"
            echo "console.log(firstNonNullDigest);"
            echo "fs.writeFileSync('digest.txt', firstNonNullDigest);"
          } > process.js
          node process.js
          digest=$(cat digest.txt)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Attest Binaries
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ inputs.attestation-binary-path }}

      - name: Generate build provenance for container
        if: ${{ !contains(steps.snapshot_flags.outputs.flags, '--snapshot') && steps.process_goreleaser_output.outputs.digest != '' && steps.process_goreleaser_output.outputs.digest != 'undefined' }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ inputs.registry-name }}
          subject-digest: ${{ steps.process_goreleaser_output.outputs.digest }}
          push-to-registry: true

      # Credit to the https://github.com/goreleaser/goreleaser/issues/2828#issuecomment-1311662146 workaround
      # for nightly/snapshot builds being locked behind the paid version of goreleaser.
      - name: List snapshot images
        # types are hard vov https://github.com/actions/runner/issues/2238
        if: true
        run: |
          short_sha=$(git rev-parse --short HEAD)
          docker image ls --format "{{.Repository}}:{{.Tag}}" | \
            grep -e "$GITHUB_REPOSITORY:.*${short_sha}.*" | \
            paste -sd ' ' /dev/stdin > images
      - name: Push snapshot images
        if: true
        run: |
          xargs -d ' ' -I{} -n1 sh -c "docker push {}" < images
      - name: Create and push manifest for :snapshot tag
        if: true
        run: |
          docker manifest create "$GITHUB_REPOSITORY:snapshot" "$(cat images)"
          docker manifest push "$GITHUB_REPOSITORY:snapshot"
