name: dependency-review

# Reusable workflow that runs actions/dependency-review-action on a PR.
# Compares the PR's dependency changes against GitHub's vulnerability
# database and license policies. Fails the check when a new dep with a
# severity at or above `fail-on-severity` is introduced.
#
# Caller MUST trigger this on `pull_request` — the action compares
# head vs base and has no meaning outside that event.

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: 'Minimum severity that fails the check (low | moderate | high | critical)'
        required: false
        type: string
        default: 'high'
      allow-licenses:
        description: 'Comma-separated SPDX license identifiers to allow (default: empty = no license gate)'
        required: false
        type: string
        default: ''
      deny-licenses:
        description: 'Comma-separated SPDX license identifiers to deny (default: empty = no license gate)'
        required: false
        type: string
        default: ''
      comment-summary-in-pr:
        description: 'Post a summary comment on the PR (always | on-failure | never)'
        required: false
        type: string
        default: 'on-failure'

permissions:
  contents: read
  pull-requests: write   # for comment-summary-in-pr

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          allow-licenses: ${{ inputs.allow-licenses }}
          deny-licenses: ${{ inputs.deny-licenses }}
          comment-summary-in-pr: ${{ inputs.comment-summary-in-pr }}
