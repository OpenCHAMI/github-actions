name: lint-workflows

# Reusable workflow that lints GitHub Actions workflow files in the caller repo.
# Runs actionlint (syntax / shellcheck / action-version sanity) and zizmor
# (security-focused static analysis with SARIF upload to GHAS).

on:
  workflow_call:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5.0.0
        with:
          persist-credentials: false
      - uses: raven-actions/actionlint@01fce4f43a235f1d04a3d6b1b202aa0eb09cdfd9 # v2.1.2
        with:
          flags: -color

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # for SARIF upload to GHAS
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5.0.0
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
